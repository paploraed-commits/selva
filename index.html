<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر سيلفا | Selva Cloner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Segoe UI', sans-serif; }
        .gold-text { color: #d4af37; }
        .purple-btn { 
            background: linear-gradient(135deg, #6d28d9, #4c1d95); 
            transition: 0.3s; 
            display: inline-block;
            text-align: center;
        }
        .purple-btn:hover { transform: scale(1.02); filter: brightness(1.2); }
        .card { background-color: #111; border: 1px solid #222; transition: 0.3s; }
        .card:hover { border-color: #6d28d9; }
        
        .hero-banner {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('image_f14dbe.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 24px;
        }
        input::placeholder { color: #555; }
        
        /* تصميم صندوق اللوقات المتطور */
        .log-box {
            background-color: #080808;
            border: 1px solid #1a1a1a;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .log-box::-webkit-scrollbar { width: 6px; }
        .log-box::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
        .log-box::-webkit-scrollbar-thumb:hover { background: #6d28d9; }
    </style>
</head>
<body>

    <nav class="p-4 border-b border-gray-900 flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <img src="avatar.jpg" alt="Selva Logo" class="h-12 rounded-full border-2 border-purple-600">
            <span class="text-xl font-bold gold-text">سيلفا</span>
        </div>
        <div class="hidden md:block">
            <span class="text-xs text-gray-500 font-mono">الاحترافية في عالم الديسكورد</span>
        </div>
    </nav>

    <header class="max-w-4xl mx-auto mt-8 px-4">
        <div class="hero-banner h-[200px] flex flex-col items-center justify-center text-center p-8 border border-gray-800 shadow-2xl">
            <h1 class="text-4xl font-black gold-text mb-2 drop-shadow-2xl">أداة سيلفا للنسخ الفوري</h1>
            <p class="text-gray-200 text-md max-w-2xl font-medium">انسخ الرومات، الرولات، والصلاحيات مباشرة عبر المتصفح وبأعلى سرعة آمنة</p>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-8">
        <div class="card p-8 rounded-3xl shadow-xl">
            <h2 class="text-xl font-bold mb-6 border-b border-gray-800 pb-3 gold-text flex items-center gap-2">🎯 لوحة التحكم بالنسخ المستقر</h2>
            
            <form id="clonerForm" class="space-y-5 text-right">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">توكن الحساب (Account Token)</label>
                    <input type="password" id="token" required placeholder="أدخل توكن الحساب هنا..." class="w-full bg-black/40 border border-gray-800 rounded-xl px-4 py-3 text-left font-mono focus:outline-none focus:border-purple-600 transition text-white">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">آيدي السيرفر المصدر (المراد نسخه)</label>
                        <input type="text" id="sourceId" required placeholder="Source Server ID" class="w-full bg-black/40 border border-gray-800 rounded-xl px-4 py-3 text-left font-mono focus:outline-none focus:border-purple-600 transition text-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">آيدي السيرفر الهدف (الجديد)</label>
                        <input type="text" id="destId" required placeholder="Destination Server ID" class="w-full bg-black/40 border border-gray-800 rounded-xl px-4 py-3 text-left font-mono focus:outline-none focus:border-purple-600 transition text-white">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="purple-btn w-full py-4 rounded-xl font-bold text-lg mt-4 shadow-lg shadow-purple-900/20">
                    🚀 ابدأ عملية النسخ المباشر
                </button>
            </form>

            <div id="statusBox" class="mt-6 border border-gray-800 rounded-xl p-4 text-sm text-left max-h-[300px] overflow-y-auto log-box" style="direction: ltr;">
                <div id="statusText" class="text-gray-500 space-y-1">
                    <div>[SYSTEM] System waiting for actions. Fill inputs and click start...</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="max-w-4xl mx-auto pb-10 text-center border-t border-gray-900 pt-8">
        <p class="text-gray-800 text-[10px]">&copy; 2026 جميع الحقوق محفوظة لمتجر سيلفا</p>
    </footer>

    <script>
        // دالة الطباعة الملونة داخل الكونسول
        const log = (text, type = 'info') => {
            const statusText = document.getElementById('statusText');
            let color = 'text-gray-400'; 
            let prefix = '[INFO]';

            if (type === 'success') { color = 'text-green-500'; prefix = '[SUCCESS]'; }
            if (type === 'error') { color = 'text-red-500'; prefix = '[ERROR]'; }
            if (type === 'warn') { color = 'text-yellow-500'; prefix = '[WARNING]'; }
            if (type === 'process') { color = 'text-purple-400'; prefix = '[CLONING]'; }
            
            const time = new Date().toLocaleTimeString();
            statusText.innerHTML += `<div class="${color} font-mono text-[13px]"><span class="text-gray-600">[${time}]</span> ${prefix} ${text}</div>`;
            
            // النزول التلقائي لآخر سطر عند طباعة أي لوق جديد
            const statusBox = document.getElementById('statusBox');
            statusBox.scrollTop = statusBox.scrollHeight;
        };

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        document.getElementById('clonerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const token = document.getElementById('token').value.trim();
            const sourceId = document.getElementById('sourceId').value.trim();
            const destId = document.getElementById('destId').value.trim();
            const btn = document.getElementById('submitBtn');
            const statusText = document.getElementById('statusText');

            btn.disabled = true;
            btn.innerText = '⏳ جاري النسخ...';
            statusText.innerHTML = ''; // تنظيف الكونسول عند البدء

            log('Initializing secure client-side bypass system...', 'info');

            // استخدام بروكسي عكسي مجاني لتخطي حظر متصفحات الـ CORS
            async function discordFetch(endpoint, method = 'GET', body = null) {
                const proxyUrl = 'https://corsproxy.io/?';
                const targetUrl = `https://discord.com/api/v9${endpoint}`;
                
                const options = {
                    method: method,
                    headers: {
                        'Authorization': token,
                        'Content-Type': 'application/json'
                    }
                };
                if (body) options.body = JSON.stringify(body);
                
                const res = await fetch(proxyUrl + encodeURIComponent(targetUrl), options);
                
                if (res.status === 429) {
                    const data = await res.json().catch(() => ({}));
                    const retryAfter = data.retry_after || 2;
                    log(`Discord rate limit hit. Pausing for ${retryAfter} seconds to avoid token flag...`, 'warn');
                    await sleep(retryAfter * 1000);
                    return discordFetch(endpoint, method, body);
                }
                return res;
            }

            try {
                // 1. فحص التوكن وجلب معلومات صاحب الحساب
                log('Connecting to Discord Gateway API...', 'info');
                const userRes = await discordFetch('/users/@me');
                if (!userRes.ok) throw new Error('The token provided is invalid or has expired.');
                const userData = await userRes.json();
                log(`Successfully authenticated account: ${userData.username}`, 'success');

                // 2. جلب رولات وقنوات السيرفر المصدر
                log('Reading structural map of the source server...', 'process');
                const sourceRolesRes = await discordFetch(`/guilds/${sourceId}/roles`);
                const sourceChannelsRes = await discordFetch(`/guilds/${sourceId}/channels`);
                
                if (!sourceRolesRes.ok || !sourceChannelsRes.ok) throw new Error('Could not access source server. Make sure your account is joined in it.');
                
                const sourceRoles = await sourceRolesRes.json();
                const sourceChannels = await sourceChannelsRes.json();
                log(`Found ${sourceChannels.length} channels and ${sourceRoles.length} roles to clone.`, 'success');

                // 3. تنظيف وقصف قنوات السيرفر الجديد
                log('Starting target server wipeout (Channels)...', 'process');
                const destChannelsRes = await discordFetch(`/guilds/${destId}/channels`);
                if (!destChannelsRes.ok) throw new Error('Target server not found or you lack Administrator permission inside it.');
                const destChannels = await destChannelsRes.json();
                
                for (const ch of destChannels) {
                    const del = await discordFetch(`/channels/${ch.id}`, 'DELETE');
                    if (del.ok) log(`Deleted channel: ${ch.name}`, 'warn');
                    await sleep(350);
                }

                // تنظيف رولات السيرفر الجديد
                log('Starting target server wipeout (Roles)...', 'process');
                const destRolesRes = await discordFetch(`/guilds/${destId}/roles`);
                const destRoles = await destRolesRes.json();
                for (const r of destRoles) {
                    if (r.name !== '@everyone' && !r.managed) {
                        const delRole = await discordFetch(`/guilds/${destId}/roles/${r.id}`, 'DELETE');
                        if (delRole.ok) log(`Deleted role: ${r.name}`, 'warn');
                        await sleep(350);
                    }
                }

                // 4. إنشاء الرتب ومطابقتها
                log('Deploying and syncing roles hierarchy...', 'process');
                const roleMap = {};
                sourceRoles.sort((a, b) => a.position - b.position);

                for (const role of sourceRoles) {
                    if (role.name === '@everyone') {
                        const targetEveryone = destRoles.find(r => r.name === '@everyone');
                        if (targetEveryone) {
                            await discordFetch(`/guilds/${destId}/roles/${targetEveryone.id}`, 'PATCH', { permissions: role.permissions });
                            roleMap[role.id] = targetEveryone.id;
                            log('Synchronized @everyone basic base permissions.', 'success');
                        }
                        continue;
                    }
                    if (role.managed) continue;

                    const newRoleRes = await discordFetch(`/guilds/${destId}/roles`, 'POST', {
                        name: role.name,
                        color: role.color,
                        hoist: role.hoist,
                        mentionable: role.mentionable,
                        permissions: role.permissions
                    });
                    
                    if (newRoleRes.ok) {
                        const newRoleData = await newRoleRes.json();
                        roleMap[role.id] = newRoleData.id;
                        log(`Created role successfully: ${role.name}`, 'success');
                    }
                    await sleep(400);
                }

                // 5. إنشاء الكاتيجوريز
                log('Building server infrastructure categories...', 'process');
                const channelMap = {};
                const categories = sourceChannels.filter(c => c.type === 4).sort((a, b) => a.position - b.position);

                for (const cat of categories) {
                    const overwrites = (cat.permission_overwrites || []).map(o => ({
                        id: roleMap[o.id] || o.id,
                        type: o.type,
                        allow: o.allow,
                        deny: o.deny
                    }));

                    const newCatRes = await discordFetch(`/guilds/${destId}/channels`, 'POST', {
                        name: cat.name,
                        type: 4,
                        permission_overwrites: overwrites
                    });

                    if (newCatRes.ok) {
                        const newCatData = await newCatRes.json();
                        channelMap[cat.id] = newCatData.id;
                        log(`Created Category: ${cat.name}`, 'success');
                    }
                    await sleep(450);
                }

                // 6. إنشاء الرومات النصية والصوتية داخل التصنيفات
                log('Injecting sub-channels (Text & Voice rooms)...', 'process');
                const textAndVoice = sourceChannels.filter(c => c.type !== 4).sort((a, b) => a.position - b.position);

                for (const ch of textAndVoice) {
                    const overwrites = (ch.permission_overwrites || []).map(o => ({
                        id: roleMap[o.id] || o.id,
                        type: o.type,
                        allow: o.allow,
                        deny: o.deny
                    }));

                    const newChRes = await discordFetch(`/guilds/${destId}/channels`, 'POST', {
                        name: ch.name,
                        type: ch.type,
                        topic: ch.topic || '',
                        nsfw: ch.nsfw || false,
                        bitrate: ch.bitrate || 64000,
                        user_limit: ch.user_limit || 0,
                        parent_id: channelMap[ch.parent_id] || null,
                        permission_overwrites: overwrites
                    });
                    
                    if (newChRes.ok) {
                        log(`Created channel room: #${ch.name}`, 'success');
                    }
                    await sleep(500);
                }

                log('Finished! Cloner job ended with 0 errors.', 'success');
                btn.innerText = '✅ تم النسخ بنجاح كامل!';
                btn.disabled = false;

            } catch (err) {
                log(err.message, 'error');
                btn.innerText = '❌ فشلت العملية';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
