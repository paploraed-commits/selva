<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر سيلفا | Selva Cloner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Segoe UI', sans-serif; }
        .gold-text { color: #d4af37; }
        .purple-btn { 
            background: linear-gradient(135deg, #6d28d9, #4c1d95); 
            transition: 0.3s; 
            display: inline-block;
            text-align: center;
        }
        .purple-btn:hover { transform: scale(1.02); filter: brightness(1.2); }
        .card { background-color: #111; border: 1px solid #222; transition: 0.3s; }
        .card:hover { border-color: #6d28d9; }
        
        .hero-banner {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('image_f14dbe.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 24px;
        }
        input::placeholder { color: #555; }
    </style>
</head>
<body>

    <nav class="p-4 border-b border-gray-900 flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <img src="avatar.jpg" alt="Selva Logo" class="h-12 rounded-full border-2 border-purple-600">
            <span class="text-xl font-bold gold-text">سيلفا</span>
        </div>
        <div class="hidden md:block">
            <span class="text-xs text-gray-500 font-mono">الاحترافية في عالم الديسكورد</span>
        </div>
    </nav>

    <header class="max-w-4xl mx-auto mt-8 px-4">
        <div class="hero-banner h-[200px] flex flex-col items-center justify-center text-center p-8 border border-gray-800 shadow-2xl">
            <h1 class="text-4xl font-black gold-text mb-2 drop-shadow-2xl">أداة سيلفا للنسخ والنيوك</h1>
            <p class="text-gray-200 text-md max-w-2xl font-medium">انسخ سيرفرك بالكامل (رومات، رولات، وصلاحيات) بثوانٍ وبدون برامج</p>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-8">
        <div class="card p-8 rounded-3xl shadow-xl">
            <h2 class="text-xl font-bold mb-6 border-b border-gray-800 pb-3 gold-text flex items-center gap-2">🎯 لوحة التحكم بالنسخ</h2>
            
            <form id="clonerForm" class="space-y-5 text-right">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">توكن الحساب أو البوت (Token)</label>
                    <input type="password" id="token" required placeholder="أدخل التوكن هنا..." class="w-full bg-black/40 border border-gray-800 rounded-xl px-4 py-3 text-left font-mono focus:outline-none focus:border-purple-600 transition text-white">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">آيدي السيرفر المصدر (الي بدك تنسخ منه)</label>
                        <input type="text" id="sourceId" required placeholder="Source Server ID" class="w-full bg-black/40 border border-gray-800 rounded-xl px-4 py-3 text-left font-mono focus:outline-none focus:border-purple-600 transition text-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">آيدي السيرفر الهدف (الي بدك تنسخ له)</label>
                        <input type="text" id="destId" required placeholder="Destination Server ID" class="w-full bg-black/40 border border-gray-800 rounded-xl px-4 py-3 text-left font-mono focus:outline-none focus:border-purple-600 transition text-white">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="purple-btn w-full py-4 rounded-xl font-bold text-lg mt-4 shadow-lg shadow-purple-900/20">
                    🚀 ابدأ عملية النسخ الفوري
                </button>
            </form>

            <div id="statusBox" class="hidden mt-6 bg-black/60 border border-gray-800 rounded-xl p-4 text-sm font-mono text-left dir-ltr max-h-[150px] overflow-y-auto">
                <div id="statusText" class="text-gray-400">في انتظار بدء العملية...</div>
            </div>
        </div>
    </main>

    <footer class="max-w-4xl mx-auto pb-10 text-center border-t border-gray-900 pt-8">
        <p class="text-gray-800 text-[10px]">&copy; 2026 جميع الحقوق محفوظة لمتجر سيلفا</p>
    </footer>

    <script>
        document.getElementById('clonerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const token = document.getElementById('token').value;
            const sourceId = document.getElementById('sourceId').value;
            const destId = document.getElementById('destId').value;
            const btn = document.getElementById('submitBtn');
            const statusBox = document.getElementById('statusBox');
            const statusText = document.getElementById('statusText');

            btn.disabled = true;
            btn.innerText = '⏳ جاري عملية النسخ الحارق...';
            statusBox.classList.remove('hidden');
            statusText.innerHTML = '<span class="text-yellow-500">[INFO]</span> Connecting to backend cloner service...';

            try {
                // تم ربط الرابط المباشر للخدمة بنجاح هنا
                const BACKEND_URL = 'https://selva-backend-2lu6.onrender.com/api/clone'; 

                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, sourceId, destId })
                });

                const data = await response.json();

                if (response.ok) {
                    statusText.innerHTML += `<br><span class="text-green-500">[SUCCESS]</span> ${data.message}`;
                    btn.innerText = '✅ تم النسخ بنجاح!';
                } else {
                    statusText.innerHTML += `<br><span class="text-red-500">[ERROR]</span> ${data.error}`;
                    btn.innerText = '❌ فشلت العملية';
                    btn.disabled = false;
                }
            } catch (err) {
                statusText.innerHTML += `<br><span class="text-red-500">[ERROR]</span> تعذر معالجة الطلب أو تجاوز وقت الاستجابة المسموح.`;
                btn.innerText = '❌ خطأ في الاتصال';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
