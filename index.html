<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر سيلفا | Selva Cloner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Segoe UI', sans-serif; }
        .gold-text { color: #d4af37; }
        .purple-btn { 
            background: linear-gradient(135deg, #6d28d9, #4c1d95); 
            transition: 0.3s; 
            display: inline-block;
            text-align: center;
        }
        .purple-btn:hover { transform: scale(1.02); filter: brightness(1.2); }
        .card { background-color: #111; border: 1px solid #222; transition: 0.3s; }
        .card:hover { border-color: #6d28d9; }
        
        .hero-banner {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('image_f14dbe.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 24px;
        }
        input::placeholder { color: #555; }
        .log-box::-webkit-scrollbar { width: 6px; }
        .log-box::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>

    <nav class="p-4 border-b border-gray-900 flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <img src="avatar.jpg" alt="Selva Logo" class="h-12 rounded-full border-2 border-purple-600">
            <span class="text-xl font-bold gold-text">سيلفا</span>
        </div>
        <div class="hidden md:block">
            <span class="text-xs text-gray-500 font-mono">الاحترافية في عالم الديسكورد</span>
        </div>
    </nav>

    <header class="max-w-4xl mx-auto mt-8 px-4">
        <div class="hero-banner h-[200px] flex flex-col items-center justify-center text-center p-8 border border-gray-800 shadow-2xl">
            <h1 class="text-4xl font-black gold-text mb-2 drop-shadow-2xl">أداة سيلفا للنسخ الفوري</h1>
            <p class="text-gray-200 text-md max-w-2xl font-medium">انسخ الرومات، الرولات، والصلاحيات مباشرة عبر المتصفح وبأعلى سرعة آمنة</p>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-8">
        <div class="card p-8 rounded-3xl shadow-xl">
            <h2 class="text-xl font-bold mb-6 border-b border-gray-800 pb-3 gold-text flex items-center gap-2">🎯 لوحة التحكم بالنسخ المستقر</h2>
            
            <form id="clonerForm" class="space-y-5 text-right">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">توكن الحساب (Account Token)</label>
                    <input type="password" id="token" required placeholder="أدخل توكن الحساب هنا..." class="w-full bg-black/40 border border-gray-800 rounded-xl px-4 py-3 text-left font-mono focus:outline-none focus:border-purple-600 transition text-white">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">آيدي السيرفر المصدر (المراد نسخه)</label>
                        <input type="text" id="sourceId" required placeholder="Source Server ID" class="w-full bg-black/40 border border-gray-800 rounded-xl px-4 py-3 text-left font-mono focus:outline-none focus:border-purple-600 transition text-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">آيدي السيرفر الهدف (الجديد)</label>
                        <input type="text" id="destId" required placeholder="Destination Server ID" class="w-full bg-black/40 border border-gray-800 rounded-xl px-4 py-3 text-left font-mono focus:outline-none focus:border-purple-600 transition text-white">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="purple-btn w-full py-4 rounded-xl font-bold text-lg mt-4 shadow-lg shadow-purple-900/20">
                    🚀 ابدأ عملية النسخ المباشر
                </button>
            </form>

            <div id="statusBox" class="hidden mt-6 bg-black/60 border border-gray-800 rounded-xl p-4 text-sm font-mono text-left max-h-[250px] overflow-y-auto log-box" style="direction: ltr;">
                <div id="statusText" class="text-gray-400 space-y-1"></div>
            </div>
        </div>
    </main>

    <footer class="max-w-4xl mx-auto pb-10 text-center border-t border-gray-900 pt-8">
        <p class="text-gray-800 text-[10px]">&copy; 2026 جميع الحقوق محفوظة لمتجر سيلفا</p>
    </footer>

    <script>
        const log = (text, type = 'info') => {
            const statusText = document.getElementById('statusText');
            let color = 'text-gray-400';
            if (type === 'success') color = 'text-green-500';
            if (type === 'error') color = 'text-red-500';
            if (type === 'warn') color = 'text-yellow-500';
            
            statusText.innerHTML += `<div class="${color}">[${type.toUpperCase()}] ${text}</div>`;
            document.getElementById('statusBox').scrollTop = document.getElementById('statusBox').scrollHeight;
        };

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        document.getElementById('clonerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const token = document.getElementById('token').value.trim();
            const sourceId = document.getElementById('sourceId').value.trim();
            const destId = document.getElementById('destId').value.trim();
            const btn = document.getElementById('submitBtn');
            const statusBox = document.getElementById('statusBox');
            const statusText = document.getElementById('statusText');

            btn.disabled = true;
            btn.innerText = '⏳ جاري النسخ...';
            statusBox.classList.remove('hidden');
            statusText.innerHTML = '';

            log('Initializing Discord Local API connection...', 'info');

            // دالة لإرسال الطلبات المباشرة لريست ديسكورد بإنترنت وجهاز المستخدم
            async function discordFetch(endpoint, method = 'GET', body = null) {
                const options = {
                    method: method,
                    headers: {
                        'Authorization': token,
                        'Content-Type': 'application/json'
                    }
                };
                if (body) options.body = JSON.stringify(body);
                
                const res = await fetch(`https://discord.com/api/v9${endpoint}`, options);
                if (res.status === 429) {
                    const retryAfter = (await res.json()).retry_after || 1;
                    log(`Rate limit hit. Sleeping for ${retryAfter}s`, 'warn');
                    await sleep(retryAfter * 1000);
                    return discordFetch(endpoint, method, body);
                }
                return res;
            }

            try {
                // 1. التحقق من التوكن وجلب البيانات الأساسية
                const userRes = await discordFetch('/users/@me');
                if (!userRes.ok) throw new Error('Invalid account token provided.');
                const userData = await userRes.json();
                log(`Connected successfully as: ${userData.username}#${userData.discriminator}`, 'success');

                // 2. جلب رولات ورومات السيرفر المصدر
                log('Fetching source server structure...', 'info');
                const sourceRolesRes = await discordFetch(`/guilds/${sourceId}/roles`);
                const sourceChannelsRes = await discordFetch(`/guilds/${sourceId}/channels`);
                
                if (!sourceRolesRes.ok || !sourceChannelsRes.ok) throw new Error('Failed to fetch source server data. Verify server ID and member permissions.');
                
                const sourceRoles = await sourceRolesRes.json();
                const sourceChannels = await sourceChannelsRes.json();

                // 3. مسح قنوات ورولات السيرفر المستهدف لتنظيفه
                log('Cleaning target server channels...', 'info');
                const destChannelsRes = await discordFetch(`/guilds/${destId}/channels`);
                if (!destChannelsRes.ok) throw new Error('Target server not found or missing Admin rights.');
                const destChannels = await destChannelsRes.json();
                
                for (const ch of destChannels) {
                    await discordFetch(`/channels/${ch.id}`, 'DELETE');
                    await sleep(350);
                }

                log('Cleaning target server roles...', 'info');
                const destRolesRes = await discordFetch(`/guilds/${destId}/roles`);
                const destRoles = await destRolesRes.json();
                for (const r of destRoles) {
                    if (r.name !== '@everyone' && !r.managed) {
                        await discordFetch(`/guilds/${destId}/roles/${r.id}`, 'DELETE');
                        await sleep(350);
                    }
                }

                //
